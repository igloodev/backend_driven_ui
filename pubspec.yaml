name: backend_driven_ui
description: Server-Driven UI framework for Flutter with ApiWidget - build data-driven interfaces without FutureBuilder boilerplate.
version: 0.6.0
homepage: https://github.com/igloodev/backend_driven_ui
repository: https://github.com/igloodev/backend_driven_ui
issue_tracker: https://github.com/igloodev/backend_driven_ui/issues

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

screenshots:
  - description: Chats screen rendered entirely from backend JSON
    path: screenshots/1_chats.jpg
  - description: Status screen rendered from backend JSON
    path: screenshots/2_status.jpg
  - description: Calls screen rendered from backend JSON
    path: screenshots/3_calls.jpg
  - description: Settings screen rendered from backend JSON
    path: screenshots/4_settings.jpg

topics:
  - server-driven-ui
  - api
  - widgets
  - dynamic-ui
  - remote-config
